name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi
          pip install pyinstaller

      - name: Build exe
        shell: pwsh
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          pyinstaller --clean --noconfirm --onefile --name annual_leave_tool.exe main.py --collect-submodules holidays --exclude-module matplotlib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: annual_leave_tool_windows_exe
          path: dist/annual_leave_tool.exe

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/annual_leave_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
